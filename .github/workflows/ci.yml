name: Lota CI & Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
    - name: go vet
      run: go vet ./...

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
    - name: Download dependencies
      run: go mod download
    - name: Verify modules
      run: go mod verify
    - name: Run tests
      run: go test -race ./...

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [ lint, test ]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
    - name: Build release binaries
      env:
        VERSION: ${{ github.ref_name }}
      run: ./scripts/build.sh
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  aur_sync:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [ release ]
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
    - name: Install AUR sync dependencies
      run: pacman -Syu --noconfirm git openssh base-devel
    - uses: actions/checkout@v6
    - name: Setup AUR SSH key
      env:
        AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
      run: |
        if [ -z "${AUR_SSH_PRIVATE_KEY}" ]; then
          echo "AUR_SSH_PRIVATE_KEY secret is not configured"
          exit 1
        fi
        install -m 700 -d ~/.ssh
        printf '%s\n' "${AUR_SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
    - name: Update AUR package
      env:
        VERSION: ${{ github.ref_name }}
      run: ./scripts/update-aur.sh "${VERSION}"
