name: PR Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          install-mode: goinstall
          args: --timeout=5m

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Run tests
        run: go test -v -race ./...

  bump:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Checkout as main (cocogitto branch_whitelist workaround)
        run: git checkout -B main ${{ github.event.pull_request.head.sha }}

      - name: Auto bump tag
        id: bump
        uses: cocogitto/cocogitto-action@v3
        with:
          check: false
          release: true
          git-user: github-actions[bot]
          git-user-email: github-actions[bot]@users.noreply.github.com

      - name: No release needed
        if: ${{ steps.bump.outputs.version == '' }}
        run: echo "No conventional commits requiring a new release tag"
