# Global tee logging: all commands inherit this unless independent is set
log:
  path: logs/all.log

vars:
- ENV_VAR_1=value1
- import:env .env
- ENV_VAR_2=value2
- import:yaml env.yml@public app_name

helpwor:
  script: echo $app_name.app_name

group1:
  desc: Test group 1 description
  color: cyan
  # Group-level log: commands in this group write to both logs/all.log and logs/group1.log
  log:
    path: logs/group1.log
  args:
  - environment|env:str="prod"
  - timeout:int=30
  command1:
    desc: Test command 1
    inherit_color: true
    # Command-level log with truncate: writes to all.log + group1.log + build.log
    log:
      path: logs/build.log
      truncate: true
    args:
    - param1:str
    - param2|p:int=10
    before: echo "before hook"
    script: echo "test script $environment $param1 $param2 timeout=$timeout"
    after: echo "after hook"

  command2:
    desc: Test command 2 with wildcard
    args:
    - ...args
    script: |
      echo "multiline script"
      echo "line 2"
      echo "$args"

  command3:
    desc: Test command 3 with flags
    args:
    - output|o:str="./bin"
    - verbose|v:bool
    script: echo "output=$output verbose=$verbose"

  command4:
    desc: Test command 4 with array
    args:
    - files:arr[5]
    script: 'echo "files: $files"'

  command6:
    desc: Test command 6 with bool negation
    args:
    - verbose|v:bool=true
    - debug|d:bool=false
    script: echo "verbose=$verbose debug=$debug"

group2:
  desc: Test group 2 description
  color: yellow
  # Independent group log: commands here write ONLY to logs/group2.log
  log:
    path: logs/group2.log
    independent: true
  command5:
    desc: Test command 5 with positional and wildcard
    args:
    - service:str
    - ...cmd
    script: docker exec $service $cmd
  group15:
    desc: Test group 2 description
    command51:
      desc: Test command 5 with positional and wildcard
      args:
      - service:str
      - ...cmd
      script: docker exec $service $cmd

command6:
  desc: 124124214
  args:
  - service:str
  - ...cmd
  script: docker exec $service $cmd

hello-world:
  desc: "Test Command"
  # Simple command-level log with append (default)
  log:
    path: logs/hello.log
  args:
  - name|n:str
  script: |
    echo Hello $name

test-import:
  desc: Test YAML import
  vars:
  - import:yaml env.yml app
  script: |
    echo "app_name=$app.public.app_name"
    echo "version=$app.public.version"
    echo "debug=$app.public.debug"
